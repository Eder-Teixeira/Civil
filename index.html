<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AR Civil Pro · Estabilidade Total</title>

    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/3.4.5/aframe/build/aframe-ar.js"></script>
    <script src="https://raw.githack.com/fcor/arjs-gestures/master/dist/gestures.js"></script>

    <style>
        /* 1. TELA CHEIA E TRANSPARÊNCIA */
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: transparent; }
        
        #ar-container { width: 100%; height: 100%; position: absolute; top: 0; left: 0; }

        /* 2. FORÇAR A CÂMERA A APARECER NO FUNDO */
        video {
            width: 100vw !important;
            height: 100vh !important;
            object-fit: cover !important;
            position: fixed !important;
            top: 0;
            left: 0;
            z-index: -2;
        }

        .a-canvas { background-color: transparent !important; }

        /* 3. BOTÃO DE SAIR (CORRIGIDO) */
        .btn-exit { 
            position: fixed; top: 20px; right: 20px; z-index: 9999;
            background: #ff4444; color: white; border: none;
            width: 50px; height: 50px; border-radius: 50%; 
            font-size: 24px; font-weight: bold; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body style="margin: 0; background-color: transparent;">

    <!-- Botão de Sair que recarrega o app -->
    <button class="btn-exit" onclick="window.location.reload();">✕</button>

    <div id="ar-container">
        <a-scene 
            embedded 
            arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; smooth: true; smoothCount: 15; smoothTolerance: 0.05; smoothThreshold: 5;" 
            vr-mode-ui="enabled: false"
            renderer="alpha: true; antialias: true; logarithmicDepthBuffer: true; colorManagement: true;"
            gesture-detector>
            
            <a-assets>
                <a-asset-item id="modelo" src="edificio_grande.glb"></a-asset-item>
            </a-assets>

            <!-- Marcador Hiro com suporte a Zoom, Rotação e Arrastar -->
            <a-marker 
                preset="hiro" 
                raycaster="objects: .clickable" 
                emitevents="true" 
                cursor="fuse: false; rayOrigin: mouse;"
                id="marker">
                
                <a-entity 
                    id="render-entity"
                    gltf-model="#modelo" 
                    scale="1 1 1" 
                    position="0 0 0"
                    class="clickable"
                    gesture-handler="minScale: 0.1; maxScale: 10;">
                </a-entity>
            </a-marker>

            <a-entity camera></a-entity>
        </a-scene>
    </div>

    <script>
        // Garante que o botão de fechar funcione mesmo em celulares travados
        document.querySelector('.btn-exit').addEventListener('touchstart', function() {
            window.location.reload();
        });
    </script>
</body>
</html>
