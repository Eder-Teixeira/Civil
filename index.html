<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AR Civil Pro · Foco Total</title>

    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/3.4.5/aframe/build/aframe-ar.js"></script>
    <script src="https://raw.githack.com/fcor/arjs-gestures/master/dist/gestures.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        /* ✅ Fundo transparente — o vídeo da câmera precisa aparecer */
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: transparent !important;
        }

        /* ✅ Vídeo da câmera (injetado pelo AR.js) cobre a tela toda */
        video {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100% !important;
            height: 100% !important;
            object-fit: cover !important;
            z-index: 0;
        }

        /* ✅ Canvas do A-Frame fica por cima, mas com fundo transparente */
        canvas {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100% !important;
            height: 100% !important;
            z-index: 1;
            background: transparent !important;
        }
    </style>
</head>
<body>

    <!-- ✅ SEM "embedded": AR.js assume o controle total do layout -->
    <a-scene
        arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix;"
        vr-mode-ui="enabled: false"
        renderer="alpha: true; antialias: true; logarithmicDepthBuffer: true; clearColor: 0 0 0 0;"
        background="transparent: true"
        gesture-detector>

        <a-assets>
            <a-asset-item id="modelo" src="edificio_grande.glb"></a-asset-item>
        </a-assets>

        <a-marker
            preset="hiro"
            raycaster="objects: .clickable"
            emitevents="true"
            cursor="fuse: false; rayOrigin: mouse;">

            <a-entity
                id="render-entity"
                gltf-model="#modelo"
                scale="1 1 1"
                position="0 0 0"
                class="clickable"
                gesture-handler>
            </a-entity>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        // Garante resize após a câmera inicializar
        window.addEventListener('load', () => {
            [500, 1000, 2000].forEach(t =>
                setTimeout(() => window.dispatchEvent(new Event('resize')), t)
            );
        });
    </script>
</body>
</html>
