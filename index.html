<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AR Civil Pro · Foco Total</title>

    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/3.4.5/aframe/build/aframe-ar.js"></script>
    <script src="https://raw.githack.com/fcor/arjs-gestures/master/dist/gestures.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: transparent !important;
        }

        /* Cobre qualquer container que o AR.js criar para o vídeo */
        video,
        #arjs-video,
        .a-canvas,
        canvas {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100vw !important;
            height: 100vh !important;
            object-fit: cover !important;
            background: transparent !important;
        }

        video { z-index: 0; }
        canvas { z-index: 1; }
    </style>
</head>
<body>

    <a-scene
        arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix;"
        vr-mode-ui="enabled: false"
        renderer="alpha: true; antialias: true; logarithmicDepthBuffer: true; clearColor: 0 0 0 0;"
        background="transparent: true"
        gesture-detector>

        <a-assets>
            <a-asset-item id="modelo" src="edificio_grande.glb"></a-asset-item>
        </a-assets>

        <a-marker
            preset="hiro"
            raycaster="objects: .clickable"
            emitevents="true"
            cursor="fuse: false; rayOrigin: mouse;">

            <a-entity
                id="render-entity"
                gltf-model="#modelo"
                scale="1 1 1"
                position="0 0 0"
                class="clickable"
                gesture-handler>
            </a-entity>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        // ✅ Intercepta o vídeo assim que o AR.js o injeta no DOM
        // e força as dimensões corretas da tela do celular
        function fixVideoSize() {
            const videos = document.querySelectorAll('video');
            videos.forEach(v => {
                v.style.cssText = `
                    position: fixed !important;
                    top: 0 !important;
                    left: 0 !important;
                    width: 100vw !important;
                    height: 100vh !important;
                    object-fit: cover !important;
                    z-index: 0 !important;
                `;
                // Remove atributos width/height que o AR.js seta inline
                v.removeAttribute('width');
                v.removeAttribute('height');
            });
        }

        // Roda em múltiplos momentos porque o AR.js injeta o vídeo de forma assíncrona
        window.addEventListener('load', () => {
            [200, 500, 1000, 2000].forEach(t =>
                setTimeout(() => {
                    fixVideoSize();
                    window.dispatchEvent(new Event('resize'));
                }, t)
            );
        });

        // ✅ MutationObserver: detecta exatamente quando o AR.js adiciona o vídeo ao DOM
        const observer = new MutationObserver(() => {
            const video = document.querySelector('video');
            if (video) {
                fixVideoSize();
                observer.disconnect(); // Para de observar depois de corrigir
            }
        });

        observer.observe(document.body, { childList: true, subtree: true });
    </script>
</body>
</html>
