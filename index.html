<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AR Civil Pro · Realidade Aumentada</title>

    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/3.4.5/aframe/build/aframe-ar.js"></script>

    <style>
        /* 1. FORÇAR TRANSPARÊNCIA TOTAL */
        body, html { margin: 0; overflow: hidden; width: 100%; height: 100%; background-color: transparent; }

        /* 2. GARANTIR QUE O VÍDEO DA CÂMERA APAREÇA NO FUNDO */
        video {
            position: fixed !important;
            top: 0;
            left: 0;
            width: 100% !important;
            height: 100% !important;
            object-fit: cover !important;
            z-index: -1; /* Joga a câmera para trás de tudo */
        }

        .a-canvas { background-color: transparent !important; }

        /* Interface do Usuário (Botão Sair) */
        .btn-exit { 
            position: fixed; top: 20px; right: 20px; z-index: 1000;
            background: #ff4444; color: white; width: 45px; height: 45px; 
            border-radius: 50%; border: none; font-weight: bold;
        }
        
        #dashboard { 
            position: absolute; z-index: 100; background: #070b14; 
            width: 100%; height: 100%; padding: 20px; color: white; font-family: sans-serif;
        }
    </style>
</head>
<body style="margin: 0; overflow: hidden;">

    <div id="dashboard">
        <h1>AR CIVIL PRO</h1>
        <p>Edifício Alpha - Estrutural</p>
        <button style="padding: 15px; background: #00e5ff; border: none; border-radius: 8px; font-weight: bold;" 
                onclick="iniciarAR()">MIRAR PROJETO NA MESA</button>
    </div>

    <button id="btn-sair" class="btn-exit" style="display:none;" onclick="location.reload()">✕</button>

    <!-- 3. CONFIGURAÇÃO DA CENA PARA TRANSPARÊNCIA -->
    <a-scene 
        embedded 
        arjs="sourceType: webcam; debugUIEnabled: false;" 
        vr-mode-ui="enabled: false"
        renderer="alpha: true; antialias: true; logarithmicDepthBuffer: true;">
        
        <a-assets>
            <a-asset-item id="modelo" src="edificio_grande.glb"></a-asset-item>
        </a-assets>

        <a-marker preset="hiro">
            <!-- Escala 1.5 para ele ficar grande na mesa -->
            <a-entity 
                gltf-model="#modelo" 
                scale="1.5 1.5 1.5" 
                position="0 0 0">
            </a-entity>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        function iniciarAR() {
            document.getElementById('dashboard').style.display = 'none';
            document.getElementById('btn-sair').style.display = 'block';
        }
    </script>
</body>
</html>
