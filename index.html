<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AR Civil Pro · Tela Cheia</title>

    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/3.4.5/aframe/build/aframe-ar.js"></script>
    <!-- Biblioteca extra para Gestos (Zoom e Rotação) -->
    <script src="https://raw.githack.com/fcor/arjs-gestures/master/dist/gestures.js"></script>

    <style>
        /* CORREÇÃO DAS FAIXAS: Força 100% da tela */
        body, html { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            background-color: #000; 
        }

        #ar-container {
            width: 100%;
            height: 100%;
        }

        video {
            width: 100vw !important;
            height: 100vh !important;
            margin: 0 !important;
            object-fit: cover !important; /* Preenche a tela toda sem faixas */
        }

        .btn-exit { 
            position: fixed; top: 10px; right: 10px; z-index: 1000;
            background: rgba(255,0,0,0.7); color: white; border: none;
            width: 40px; height: 40px; border-radius: 50%; font-weight: bold;
        }
    </style>
</head>
<body style="margin: 0;">

    <button class="btn-exit" onclick="location.reload()">✕</button>

    <div id="ar-container">
        <!-- 'gesture-detector' ativa o controle por dedos -->
        <a-scene 
            embedded 
            arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; smooth: true; smoothCount: 10;" 
            vr-mode-ui="enabled: false"
            renderer="alpha: true; antialias: true; logarithmicDepthBuffer: true;"
            gesture-detector>
            
            <a-assets>
                <a-asset-item id="modelo" src="edificio_grande.glb"></a-asset-item>
            </a-assets>

            <!-- Marcador Hiro com detecção de gestos -->
            <a-marker 
                preset="hiro" 
                raycaster="objects: .clickable" 
                emitevents="true" 
                cursor="fuse: false; rayOrigin: mouse;"
                id="marker">
                
                <a-entity 
                    id="render-entity"
                    gltf-model="#modelo" 
                    scale="1 1 1" 
                    position="0 0 0"
                    class="clickable"
                    gesture-handler="minScale: 0.25; maxScale: 10;">
                </a-entity>
            </a-marker>

            <a-entity camera></a-entity>
        </a-scene>
    </div>
</body>
</html>
