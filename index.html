<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AR Civil Pro · Estabilidade Total</title>

    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/3.4.5/aframe/build/aframe-ar.js"></script>
    <script src="https://raw.githack.com/fcor/arjs-gestures/master/dist/gestures.js"></script>

    <style>
        /* 1. CORREÇÃO DA TRANSPARÊNCIA */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: transparent !important;
        }

        /* Força o canvas do AR a ser transparente */
        .a-canvas {
            background-color: transparent !important;
        }

        /* Força a câmera a preencher o fundo */
        video {
            position: fixed !important;
            top: 0;
            left: 0;
            width: 100vw !important;
            height: 100vh !important;
            object-fit: cover !important;
            z-index: -1;
        }

        /* 2. CORREÇÃO DO BOTÃO (PARA NÃO TRAVAR) */
        #btn-fechar { 
            position: fixed; 
            top: 30px; 
            right: 30px; 
            z-index: 999999; /* Valor altíssimo para ficar acima de tudo */
            background-color: #ff4444; 
            color: white; 
            border: 3px solid #fff;
            width: 60px; 
            height: 60px; 
            border-radius: 50%; 
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: auto !important; /* Força o clique a funcionar */
            touch-action: manipulation;
        }
    </style>
</head>
<body>

    <!-- Botão de Sair com múltiplos métodos de clique -->
    <button id="btn-fechar" onclick="fecharJanela()">✕</button>

    <div id="ar-container">
        <a-scene 
            embedded 
            arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; smooth: true; smoothCount: 15;" 
            vr-mode-ui="enabled: false"
            renderer="alpha: true; antialias: true; logarithmicDepthBuffer: true;"
            gesture-detector>
            
            <a-assets>
                <a-asset-item id="modelo" src="edificio_grande.glb"></a-asset-item>
            </a-assets>

            <a-marker 
                preset="hiro" 
                raycaster="objects: .clickable" 
                emitevents="true" 
                cursor="fuse: false; rayOrigin: mouse;"
                id="marker">
                
                <a-entity 
                    id="render-entity"
                    gltf-model="#modelo" 
                    scale="1 1 1" 
                    position="0 0 0"
                    class="clickable"
                    gesture-handler="minScale: 0.1; maxScale: 10;">
                </a-entity>
            </a-marker>

            <a-entity camera></a-entity>
        </a-scene>
    </div>

    <script>
        // Função para garantir que a tela feche e o vídeo pare
        function fecharJanela() {
            // Recarrega a página limpando tudo
            window.location.href = window.location.href.split('?')[0];
        }

        // Tenta forçar o clique se o botão for ignorado
        document.getElementById('btn-fechar').addEventListener('touchstart', function(e) {
            e.preventDefault();
            fecharJanela();
        }, false);
    </script>
</body>
</html>
