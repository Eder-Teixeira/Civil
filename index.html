<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AR Civil Pro</title>

    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/3.4.5/aframe/build/aframe-ar.js"></script>
    <script src="https://raw.githack.com/fcor/arjs-gestures/master/dist/gestures.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --cyan: #00e5ff;
            --green: #00e676;
            --orange: #ffab40;
            --bg: #080c14;
            --text: #cdd6f4;
            --muted: #45475a;
        }

        html, body {
            width: 100%; height: 100%;
            overflow: hidden;
            background: var(--bg);
            font-family: 'Rajdhani', sans-serif;
            color: var(--text);
        }

        /* ════ MENU ════ */
        #menu {
            position: fixed; inset: 0;
            z-index: 200;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            padding: 40px 24px 60px;
            overflow-y: auto;
        }
        #menu.hidden { display: none; }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo { font-size: 48px; margin-bottom: 12px; }
        .title { font-size: 24px; font-weight: 700; margin-bottom: 4px; }
        .subtitle { font-size: 12px; color: var(--muted); letter-spacing: 2px; }

        .card {
            border: 1px solid rgba(0,229,255,0.2);
            border-radius: 14px;
            padding: 20px;
            margin: 24px 0;
            background: rgba(0,229,255,0.05);
        }

        .card-title { font-weight: 700; margin-bottom: 8px; }
        .card-text { font-size: 13px; color: var(--green); line-height: 1.6; }

        .section-label {
            font-size: 11px;
            letter-spacing: 2px;
            color: var(--muted);
            text-transform: uppercase;
            margin: 24px 0 12px 0;
        }

        .btn {
            width: 100%;
            padding: 16px;
            margin-bottom: 12px;
            border: 1px solid rgba(0,229,255,0.2);
            border-radius: 12px;
            background: rgba(255,255,255,0.04);
            color: var(--text);
            font-family: 'Rajdhani', sans-serif;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .btn span { flex: 1; }
        .btn:active { transform: scale(0.97); }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }

        .btn-start {
            border-color: rgba(0,230,118,0.3);
            background: rgba(0,230,118,0.07);
            font-size: 16px;
            margin-top: 8px;
        }

        .gesture-info {
            font-size: 12px;
            color: var(--muted);
            margin-top: 16px;
            padding: 12px;
            border-left: 2px solid var(--cyan);
            padding-left: 14px;
            line-height: 1.6;
        }

        /* ════ AR MODE ════ */
        #back-btn {
            position: fixed;
            top: 20px; left: 20px;
            z-index: 150;
            width: 50px; height: 50px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.3);
            background: rgba(8,12,20,0.85);
            backdrop-filter: blur(8px);
            color: #fff;
            font-size: 20px;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            font-family: 'Space Mono', monospace;
        }
        #back-btn.visible { display: flex; }
        #back-btn:active { transform: scale(0.9); background: rgba(0,229,255,0.25); }

        /* ════ CONTROLES DE ZOOM ════ */
        .zoom-controls {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 150;
            display: none;
            flex-direction: column;
            gap: 10px;
        }
        .zoom-controls.visible { display: flex; }

        .zoom-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 2px solid rgba(0,229,255,0.3);
            background: rgba(8,12,20,0.85);
            backdrop-filter: blur(8px);
            color: var(--cyan);
            font-size: 20px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .zoom-btn:active { transform: scale(0.9); background: rgba(0,229,255,0.25); }

        /* ════ STATUS ════ */
        #ar-status {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 150;
            background: rgba(8,12,20,0.9);
            backdrop-filter: blur(8px);
            border: 1px solid var(--cyan);
            border-radius: 20px;
            padding: 14px 24px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: var(--cyan);
            display: none;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }
        #ar-status.visible { display: flex; }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--green);
            animation: blink 1.2s ease-in-out infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.2; }
        }

        /* ════ INSTRUÇÃO AR ════ */
        #ar-hint {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 100;
            background: rgba(8,12,20,0.9);
            border: 2px solid var(--orange);
            border-radius: 16px;
            padding: 30px;
            max-width: 90vw;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            pointer-events: none;
        }
        #ar-hint.hidden { display: none; }
        #ar-hint-icon { font-size: 48px; }
        #ar-hint-text { font-size: 16px; color: var(--orange); font-weight: 600; }

        /* ════ VIDEO FIX ════ */
        video {
            position: fixed !important;
            top: 50% !important;
            left: 50% !important;
            min-width: 100vw !important;
            min-height: 100vh !important;
            width: auto !important;
            height: auto !important;
            transform: translate(-50%, -50%) !important;
            object-fit: cover !important;
            z-index: 0 !important;
        }

        canvas {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100% !important;
            height: 100% !important;
            z-index: 1 !important;
        }

        input[type="file"] { display: none; }
    </style>
</head>
<body>

<!-- ════ MENU ════ -->
<div id="menu">
    <div class="header">
        <div class="logo">🏗️</div>
        <div class="title">Pedreiro Civil 3D</div>
        <div class="subtitle">Realidade Aumentada · Modelos 3D</div>
    </div>

    <div class="card">
        <div class="card-title">📦 Modelo carregado</div>
        <div class="card-text" id="model-name">Nenhum arquivo selecionado</div>
    </div>

    <div class="section-label">📂 Selecionar modelo</div>
    <button class="btn" onclick="document.getElementById('file-input').click()">
        <span>📁</span>
        <span>Buscar GLB / GLTF</span>
    </button>

    <button class="btn btn-start" id="btn-start" disabled onclick="startAR()">
        <span>📷</span>
        <span>Iniciar Realidade Aumentada</span>
    </button>

    <div class="gesture-info">
        <strong>💡 Gestos na tela:</strong><br>
        🖐️ Arrastar = mover<br>
        👌 Pinça = zoom<br>
        ➕➖ Botões = zoom rápido
    </div>

    <input type="file" id="file-input" accept=".glb,.gltf">
</div>

<!-- ════ AR CONTROLES ════ -->
<button id="back-btn" onclick="goBack()">←</button>

<div class="zoom-controls" id="zoom-controls">
    <button class="zoom-btn" onclick="zoomIn()">+</button>
    <button class="zoom-btn" onclick="zoomOut()">−</button>
</div>

<div id="ar-status">
    <span class="status-dot"></span>
    <span id="status-text">Procurando marcador Hiro...</span>
</div>

<div id="ar-hint">
    <div id="ar-hint-icon">🔍</div>
    <div id="ar-hint-text">Aponte para o marcador Hiro</div>
</div>

<!-- ════ CENA A-FRAME ════ -->
<a-scene
    arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix;"
    vr-mode-ui="enabled: false"
    renderer="alpha: true; antialias: true;"
    gesture-detector
    id="ar-scene">

    <a-marker preset="hiro" id="hiro-marker" emitevents="true">
        <!-- Entidade do modelo com gesture-handler para pan e pinch -->
        <a-entity 
            id="model-entity"
            scale="1 1 1"
            position="0 0 0"
            rotation="0 0 0"
            gesture-handler>
        </a-entity>
    </a-marker>

    <a-entity camera></a-entity>
</a-scene>

<script>
    let modelURL = null;
    let currentScale = 1;
    const SCALE_STEP = 0.1;
    const MIN_SCALE = 0.5;
    const MAX_SCALE = 3;

    // ════ CARREGAMENTO ════
    document.getElementById('file-input').addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;

        modelURL = URL.createObjectURL(file);
        document.getElementById('model-name').textContent = `✅ ${file.name} (${(file.size / 1024 / 1024).toFixed(2)} MB)`;
        document.getElementById('btn-start').disabled = false;

        e.target.value = '';
    });

    // ════ INICIAR AR ════
    function startAR() {
        if (!modelURL) return;

        document.getElementById('menu').classList.add('hidden');
        document.getElementById('back-btn').classList.add('visible');
        document.getElementById('zoom-controls').classList.add('visible');
        document.getElementById('ar-status').classList.add('visible');
        document.getElementById('ar-hint').classList.remove('hidden');

        // Carrega modelo
        const entity = document.getElementById('model-entity');
        entity.removeAttribute('gltf-model');

        requestAnimationFrame(() => {
            requestAnimationFrame(() => {
                entity.setAttribute('gltf-model', modelURL);
            });
        });

        // Corrige vídeo
        [200, 600, 1200, 2500].forEach(t => setTimeout(fixVideo, t));
    }

    // ════ VOLTAR ════
    function goBack() {
        document.getElementById('menu').classList.remove('hidden');
        document.getElementById('back-btn').classList.remove('visible');
        document.getElementById('zoom-controls').classList.remove('visible');
        document.getElementById('ar-status').classList.remove('visible');
        document.getElementById('ar-hint').classList.add('hidden');
        currentScale = 1;
        document.getElementById('model-entity').setAttribute('scale', '1 1 1');
    }

    // ════ ZOOM ════
    function zoomIn() {
        if (currentScale < MAX_SCALE) {
            currentScale += SCALE_STEP;
            updateScale();
        }
    }

    function zoomOut() {
        if (currentScale > MIN_SCALE) {
            currentScale -= SCALE_STEP;
            updateScale();
        }
    }

    function updateScale() {
        const scale = currentScale.toFixed(2);
        document.getElementById('model-entity').setAttribute('scale', `${scale} ${scale} ${scale}`);
    }

    // ════ FIX VÍDEO ════
    function fixVideo() {
        document.querySelectorAll('video').forEach(v => {
            v.removeAttribute('width');
            v.removeAttribute('height');
        });
    }

    // ════ MARCADOR ════
    const marker = document.getElementById('hiro-marker');
    const statusText = document.getElementById('status-text');
    const hintEl = document.getElementById('ar-hint');
    const dotEl = document.querySelector('.status-dot');

    marker.addEventListener('markerFound', () => {
        statusText.textContent = '✓ Marcador detectado!';
        hintEl.classList.add('hidden');
        dotEl.style.background = '#00e676';
    });

    marker.addEventListener('markerLost', () => {
        statusText.textContent = 'Procurando marcador...';
        hintEl.classList.remove('hidden');
        dotEl.style.background = '#ffab40';
    });

    // ════ MODELO ════
    const modelEntity = document.getElementById('model-entity');

    modelEntity.addEventListener('model-loaded', () => {
        statusText.textContent = '✓ Modelo carregado!';
    });

    modelEntity.addEventListener('model-error', () => {
        statusText.textContent = '❌ Erro ao carregar';
    });
</script>

</body>
</html>
