<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AR Civil Pro · Foco Total</title>

    <!-- Bibliotecas Essenciais -->
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/3.4.5/aframe/build/aframe-ar.js"></script>
    <script src="https://raw.githack.com/fcor/arjs-gestures/master/dist/gestures.js"></script>

    <style>
        /* RESET TOTAL PARA ELIMINAR FAIXAS */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        html, body { 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            background-color: transparent !important; 
        }

        #ar-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* Força a câmera a cobrir cada canto da tela do celular */
        video {
            width: 100% !important;
            height: 100% !important;
            object-fit: cover !important;
        }
    </style>
</head>
<body style="margin: 0px; overflow: hidden;">

    <div id="ar-container">
        <!-- 'alpha: true' é o que deixa a mesa aparecer no fundo -->
        <a-scene 
            embedded 
            arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix;" 
            vr-mode-ui="enabled: false"
            renderer="alpha: true; antialias: true; logarithmicDepthBuffer: true;"
            gesture-detector>
            
            <a-assets>
                <!-- O arquivo que você renomeou no GitHub -->
                <a-asset-item id="modelo" src="edificio_grande.glb"></a-asset-item>
            </a-assets>

            <!-- Marcador Hiro -->
            <a-marker 
                preset="hiro" 
                raycaster="objects: .clickable" 
                emitevents="true" 
                cursor="fuse: false; rayOrigin: mouse;">
                
                <a-entity 
                    id="render-entity"
                    gltf-model="#modelo" 
                    scale="1 1 1" 
                    position="0 0 0"
                    class="clickable"
                    gesture-handler>
                </a-entity>
            </a-marker>

            <a-entity camera></a-entity>
        </a-scene>
    </div>

    <script>
        // Esse pequeno ajuste ajuda a "acordar" a câmera no celular e tirar as faixas
        window.addEventListener('load', () => {
            setTimeout(() => {
                window.dispatchEvent(new Event('resize'));
            }, 1000);
        });
    </script>
</body>
</html>
