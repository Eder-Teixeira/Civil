<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Test AR - Debug</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/3.4.5/aframe/build/aframe-ar.js"></script>
    <style>
        * { margin: 0; padding: 0; }
        body { width: 100%; height: 100%; overflow: hidden; font-family: Arial; }
        
        #info {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 999;
            background: rgba(0,0,0,0.8);
            color: #0f0;
            padding: 20px;
            border-radius: 8px;
            font-size: 14px;
            font-family: 'Courier New', monospace;
            max-width: 90vw;
            line-height: 1.8;
        }
    </style>
</head>
<body>

<div id="info">
    <strong>🔧 TEST AR DEBUG</strong><br>
    Status: <span id="status">Carregando...</span><br>
    Câmera: <span id="camera-status">?</span><br>
    A-Frame: <span id="aframe-status">?</span><br>
    Marcador: <span id="marker-status">❌ Não detectado</span><br>
    <br>
    <button onclick="location.reload()" style="padding: 10px; background: #0f0; color: #000; border: none; border-radius: 4px; cursor: pointer; font-weight: bold;">↻ Recarregar</button>
</div>

<!-- CENA ULTRA SIMPLES -->
<a-scene 
    arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix;"
    vr-mode-ui="enabled: false"
    renderer="alpha: true;"
    id="scene">

    <!-- Marcador Hiro com APENAS uma caixa vermelha -->
    <a-marker preset="hiro" id="marker">
        <a-box position="0 0 0" scale="0.1 0.1 0.1" color="red"></a-box>
    </a-marker>

    <a-entity camera></a-entity>
</a-scene>

<script>
    // Log status
    function updateStatus(field, value) {
        const el = document.getElementById(field + '-status');
        if (el) el.textContent = value;
    }

    // Verifica se A-Frame carregou
    if (window.AFRAME) {
        updateStatus('aframe', '✅ OK');
    } else {
        updateStatus('aframe', '❌ Erro');
    }

    // Aguarda a cena carregar
    const scene = document.getElementById('scene');
    
    scene.addEventListener('loaded', () => {
        console.log('[TEST] Cena carregada');
        updateStatus('status', '✅ Cena pronta');
    });

    // Procura pelo marcador
    const marker = document.getElementById('marker');
    
    marker.addEventListener('markerFound', () => {
        console.log('[TEST] Marcador Hiro ENCONTRADO!');
        updateStatus('marker', '✅ DETECTADO');
        updateStatus('status', '✅✅ FUNCIONANDO!');
        document.getElementById('info').style.background = 'rgba(0,0,0,0.8)';
    });

    marker.addEventListener('markerLost', () => {
        console.log('[TEST] Marcador perdido');
        updateStatus('marker', '❌ Perdido');
    });

    // Verifica permissão de câmera
    navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
        .then(() => {
            updateStatus('camera', '✅ OK');
        })
        .catch(err => {
            updateStatus('camera', '❌ ' + err.name);
        });

    // Log de erros
    window.addEventListener('error', (e) => {
        console.error('[TEST ERROR]', e.error);
        updateStatus('status', '❌ ' + e.error.message.substring(0, 30));
    });

    console.log('[TEST] Script rodando');
    updateStatus('status', '⏳ Aguardando câmera...');
</script>

</body>
</html>
